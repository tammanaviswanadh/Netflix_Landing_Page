<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Login</title>
    <style>
        body{
            background-image: url(./banner.jpg);
            background-size: 1550px 900px;
        }
        .p1{
            font-size: 50px;
            font-weight: bold;
            color: red;
            font-family: 'Arial', sans-serif;
            margin-left: 100px;
            margin-top: 20px;
        }
        .container1{
            background-color: rgba(0, 0, 0, 0.7);
            width: 400px;
            padding: 20px;
            border-radius: 5px;
            margin: auto;
            margin-top:1px;
            margin-bottom: 10%;
            color: white;
            font-family: 'Arial', sans-serif;
        }
        .container1 input{
            width: 90%;
            padding: 15px;
            margin-bottom: 15px;
            /* margin-right:15px ; */
            border: white solid 1px;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 2px;
        }
        .container1 button{
            width: 95%;
            padding: 10px;
            background-color: red;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .container1 button a{
            color: white;
            text-decoration: none;
        }
        .p2{
            color: white;
            font-family: 'Arial', sans-serif;
            font-size: x-large;

        }
        .container2 p{
            text-align: center;
            margin: 20px 0;
        }
        .container2 button{
            width: 95%;
            padding: 10px;
            background-color: #3F3838;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .forgot{
            text-align: center;
            padding-top: 10px;
        }
    
        .forgot a{
            color: grey;
        }
        .remember{
            margin-top: 10px;
            text-align: left;
            width: 100%;
        }
        .remember input{
            width: 15px;
            height: 15px;
        }

    </style>
</head>
<body>
    <div class="p1">
        <p>NETFLIX</p>
    </div>
    <div class="container1">
            <p class="p2">Sign in</p>
            <input type="text" name="username" placeholder="Enter Email or Mobile Number" required style="color: white;" width="90px">
            <input type="password" name="password" placeholder="Password" required style="color: white;" width="90px">
            <button type="submit"><a href="./profile.html">Sign in</a></button>

        <div class="container2">
            <p>OR</p>
            <button>Sign in using a code</button>
        </div>

        <div class="forgot">
            <a href="">forgot password?</a>
        </div>

        <div class="remember">
            <input type="checkbox" id="3" />
            <label for="3">remember me</label>
        </div>

        <div >
            <p>New to Netflix? <a href="">Sign up now.</a></p>
        </div>

        <div>
            <p>This page is protected by Google reCAPTCHA to ensure you are not a robot. <a href="">learn more</a> </p>
        </div>
    </div>
    
</body>
</html>
